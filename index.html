<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Random chord progression generator. Post-punk edition.">
<link rel="manifest" href="manifest.json">
<title>Prog Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --paper: #e8e0cc;
  --red: #c42020;
  --dim: #444;
  --mid: #888;
  --border: #222;
  --card-bg: #111;
}

body {
  background: var(--bg);
  color: var(--paper);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  padding: 0 0 80px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.5;
}

.app { max-width: 860px; margin: 0 auto; padding: 0 20px; }

/* ── Header ── */
header {
  border-bottom: 2px solid var(--paper);
  padding: 24px 0 20px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
}
.logo { font-family: 'Special Elite', serif; font-size: 36px; letter-spacing: -1px; line-height: 1; color: var(--paper); }
.logo span { color: var(--red); }
.tagline { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--mid); margin-top: 6px; }
.generate-btn {
  font-family: 'Special Elite', serif; font-size: 14px; letter-spacing: 2px;
  text-transform: uppercase; background: var(--red); color: #fff;
  border: none; padding: 12px 24px; cursor: pointer;
  transition: background 0.1s, transform 0.08s; white-space: nowrap; flex-shrink: 0;
}
.generate-btn:hover { background: #e02828; }
.generate-btn:active { transform: scale(0.97); }

/* ── Vibe bar ── */
.vibe-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 16px 0 14px; border-bottom: 1px dashed var(--dim); flex-wrap: wrap;
}
.vibe-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-right: 6px; }
.vibe-tag {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--mid); border: 1px solid var(--dim);
  padding: 4px 10px; cursor: pointer; background: none;
  transition: color 0.15s, border-color 0.15s;
}
.vibe-tag:hover { color: var(--paper); border-color: var(--paper); }
.vibe-tag.active { color: var(--red); border-color: var(--red); }

/* ── Playback bar ── */
.playback-bar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0 16px; border-bottom: 1px dashed var(--dim); flex-wrap: wrap;
}
.play-btn {
  font-family: 'Special Elite', serif; font-size: 13px; letter-spacing: 2px;
  text-transform: uppercase; background: none; color: var(--paper);
  border: 1px solid var(--paper); padding: 8px 18px; cursor: pointer;
  transition: background 0.12s, color 0.12s; white-space: nowrap;
}
.play-btn:hover { background: var(--paper); color: var(--bg); }
.play-btn.playing { background: var(--red); border-color: var(--red); color: #fff; }

.bpm-control {
  display: flex; align-items: center; gap: 10px; flex: 1; min-width: 180px;
}
.bpm-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); white-space: nowrap; }
.bpm-val { font-size: 13px; font-weight: 600; color: var(--paper); width: 34px; text-align: right; }
input[type=range].bpm-slider {
  -webkit-appearance: none; appearance: none; flex: 1; height: 2px;
  background: var(--dim); outline: none; cursor: pointer;
}
input[type=range].bpm-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--red); border-radius: 0; cursor: pointer;
}
input[type=range].bpm-slider::-moz-range-thumb {
  width: 14px; height: 14px; background: var(--red); border: none; border-radius: 0; cursor: pointer;
}

/* ── Sound toggle ── */
.sound-toggle {
  display: flex; gap: 0; flex-shrink: 0;
}
.sound-opt {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; background: none; color: var(--mid);
  border: 1px solid var(--dim); padding: 6px 12px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.sound-opt:first-child { border-right: none; }
.sound-opt:hover { color: var(--paper); border-color: var(--paper); }
.sound-opt.active { color: var(--bg); background: var(--paper); border-color: var(--paper); }

.loop-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim); flex-shrink: 0; transition: background 0.1s;
}
.loop-dot.pulse { background: var(--red); }
.metro-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; background: none; color: var(--mid);
  border: 1px solid var(--dim); padding: 6px 12px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s; flex-shrink: 0;
}
.metro-btn:hover { color: var(--paper); border-color: var(--paper); }
.metro-btn.on { color: var(--bg); background: var(--paper); border-color: var(--paper); }

/* ── Progression info ── */
.prog-info { padding: 28px 0 22px; display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
.prog-key { font-family: 'Special Elite', serif; font-size: 48px; color: var(--paper); line-height: 1; transition: opacity 0.2s; }
.prog-key.fade { opacity: 0; }
.prog-meta { display: flex; flex-direction: column; gap: 6px; }
.prog-name { font-family: 'Special Elite', serif; font-size: 22px; color: var(--red); }
.prog-scale { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); }
.prog-text { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-left: auto; align-self: center; cursor: pointer; transition: color 0.15s; white-space: nowrap; }
.prog-text:hover { color: var(--paper); }

/* ── Chord cards ── */
.chords-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 36px; }
@media (max-width: 600px) {
  .chords-row { grid-template-columns: repeat(2, 1fr); }
  .prog-key { font-size: 36px; }
}
.chord-card {
  background: var(--card-bg); border: 1px solid var(--border);
  padding: 14px 10px 12px; text-align: center;
  transition: border-color 0.2s, background 0.2s; cursor: default; position: relative;
}
.chord-card::before { content: attr(data-bar); position: absolute; top: 6px; left: 8px; font-size: 8px; letter-spacing: 1px; color: var(--dim); }
.chord-card:hover { border-color: var(--red); }
.chord-card.active-beat { border-color: var(--red); background: #1a0a0a; }
.chord-card.active-beat .chord-numeral { color: var(--red); }
.chord-numeral { font-family: 'Special Elite', serif; font-size: 52px; line-height: 1; color: var(--paper); margin: 8px 0 4px; transition: color 0.2s; }
.chord-name-display { font-size: 13px; font-weight: 600; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
.chord-notes-display { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-bottom: 12px; }
.chord-diagram-wrap { display: flex; justify-content: center; }

/* ── Piano roll strip ── */
.piano-roll-section { border-top: 1px dashed var(--dim); padding: 20px 0 0; margin-bottom: 28px; }
.piano-roll-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border); }
@media (max-width: 600px) { .piano-roll-row { grid-template-columns: repeat(2, 1fr); } }
.piano-roll-cell { border-right: 1px solid var(--border); padding: 10px 8px 8px; background: var(--card-bg); }
.piano-roll-cell:last-child { border-right: none; }
.piano-roll-cell-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 6px; text-align: center; }
.piano-roll-cell svg { display: block; margin: 0 auto; }

/* ── Scale strip ── */
.scale-strip { border-top: 1px dashed var(--dim); padding: 20px 0 0; margin-bottom: 30px; }
.strip-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--mid); margin-bottom: 12px; }
.scale-notes { display: flex; gap: 6px; flex-wrap: wrap; }
.scale-note { font-size: 11px; letter-spacing: 2px; border: 1px solid var(--dim); padding: 4px 10px; color: var(--mid); }
.scale-note.root { border-color: var(--red); color: var(--red); }
.scale-note.chord-tone { border-color: #555; color: var(--paper); }

/* ── Empty state ── */
.empty { text-align: center; padding: 80px 20px; border: 1px dashed var(--dim); margin: 40px 0; }
.empty-big { font-family: 'Special Elite', serif; font-size: 72px; color: var(--dim); margin-bottom: 16px; line-height: 1; }
.empty-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); }

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border); padding: 18px 0;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-note { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
.copy-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; background: none; color: var(--mid);
  border: 1px solid var(--dim); padding: 6px 14px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.copy-btn:hover { color: var(--paper); border-color: var(--paper); }
.copy-btn.copied { color: var(--red); border-color: var(--red); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--red); color: #fff; font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; padding: 10px 22px; opacity: 0;
  transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">Prog<span>Lab</span></div>
      <div class="tagline">Chord Progression Generator</div>
    </div>
    <button class="generate-btn" onclick="generate()">↯ Generate</button>
  </header>

  <div class="vibe-bar">
    <span class="vibe-label">Vibe</span>
  </div>

  <div class="playback-bar" id="playback-bar" style="display:none">
    <button class="play-btn" id="play-btn" onclick="togglePlay()">▶ Play</button>
    <div class="bpm-control">
      <span class="bpm-label">BPM</span>
      <input type="range" class="bpm-slider" id="bpm-slider" min="40" max="200" value="90" oninput="onBpmChange(this.value)">
      <span class="bpm-val" id="bpm-val">90</span>
    </div>
    <div class="sound-toggle">
      <button class="sound-opt active" id="opt-synth" onclick="setAudioMode('synth')">Synth</button>
      <button class="sound-opt" id="opt-piano" onclick="setAudioMode('piano')">Piano</button>
    </div>
    <button class="metro-btn" id="metro-btn" onclick="toggleMetronome()">Metronome</button>
    <div class="loop-dot" id="loop-dot"></div>
  </div>

  <div id="empty-state" class="empty">
    <div class="empty-big">—</div>
    <div class="empty-text">Hit generate to get a progression</div>
  </div>

  <div id="main-content" style="display:none">
    <div class="prog-info">
      <div class="prog-key" id="prog-key-el">Am</div>
      <div class="prog-meta">
        <div class="prog-name" id="prog-name-el">Cold Drive</div>
        <div class="prog-scale" id="prog-scale-el">A Natural Minor</div>
      </div>
      <div class="prog-text" id="prog-text-el" title="click to copy"></div>
    </div>

    <div class="chords-row" id="chords-row"></div>

    <div class="piano-roll-section">
      <div class="strip-label">Piano roll</div>
      <div class="piano-roll-row" id="piano-roll-row"></div>
    </div>

    <div class="scale-strip">
      <div class="strip-label">Scale tones</div>
      <div class="scale-notes" id="scale-notes-row"></div>
    </div>
  </div>

  <footer>
    <div class="footer-note">proglab · random chord progressions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="copy-btn" id="copy-btn" onclick="copyProgression()">Copy progression</button>
      <button class="copy-btn" id="midi-btn" onclick="exportMIDI()">Export MIDI</button>
    </div>
  </footer>

</div>
<div class="toast" id="toast">Copied</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// MUSIC THEORY
// ═══════════════════════════════════════════════════════════

const SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const USE_FLAT = new Set([1,3,6,8,10]);

function noteName(semi, flat) {
  const s = ((semi % 12) + 12) % 12;
  const f = flat !== undefined ? flat : USE_FLAT.has(s);
  return f ? FLAT[s] : SHARP[s];
}

const SCALE = {
  maj: [0,2,4,5,7,9,11],
  min: [0,2,3,5,7,8,10],
};

const QUALITY_SYMBOL = {
  maj: '', min: 'm', dom7: '7', maj7: 'maj7',
  min7: 'm7', dim: '°', dim7: '°7', sus4: 'sus4', sus2: 'sus2',
};

const QUALITY_INTERVALS = {
  maj:  [0,4,7], min:  [0,3,7],
  dom7: [0,4,7,10], maj7: [0,4,7,11],
  min7: [0,3,7,10], dim:  [0,3,6],
  dim7: [0,3,6,9], sus4: [0,5,7], sus2: [0,2,7],
};

function chordNotes(root, quality) {
  return QUALITY_INTERVALS[quality].map(i => (root + i) % 12);
}

function chordSymbol(root, quality, flat) {
  return noteName(root, flat) + (QUALITY_SYMBOL[quality] || '');
}

function degreeNumeral(deg, quality) {
  const R = ['I','II','III','IV','V','VI','VII'][deg - 1];
  const isLower = ['min','min7','min9','dim','dim7'].includes(quality);
  const base = isLower ? R.toLowerCase() : R;
  const sfx = quality === 'dom7' ? '7' : quality === 'maj7' ? 'Δ' :
               quality === 'min7' ? '7' : quality === 'dim' ? '°' :
               quality === 'dim7' ? '°7' : quality === 'sus4' ? 'sus4' :
               quality === 'sus2' ? 'sus2' : '';
  return base + sfx;
}

// ═══════════════════════════════════════════════════════════
// GUITAR SHAPES
// ═══════════════════════════════════════════════════════════

const OPEN_STRINGS = [4, 9, 2, 7, 11, 4];

const OPEN_SHAPES = {
  C_maj:[-1,3,2,0,1,0], D_maj:[-1,-1,0,2,3,2], E_maj:[0,2,2,1,0,0],
  G_maj:[3,2,0,0,0,3],  A_maj:[-1,0,2,2,2,0],
  A_min:[-1,0,2,2,1,0], D_min:[-1,-1,0,2,3,1], E_min:[0,2,2,0,0,0],
};

const E_OFF = {
  maj:[0,2,2,1,0,0], min:[0,2,2,0,0,0],
  dom7:[0,2,0,1,0,0], maj7:[0,2,1,1,0,0],
  min7:[0,2,0,0,0,0], dim:[0,1,2,0,-1,-1],
  dim7:null, sus4:[0,2,2,2,0,0], sus2:[0,2,4,4,0,0],
};
const A_OFF = {
  maj:[-1,0,2,2,2,0], min:[-1,0,2,2,1,0],
  dom7:[-1,0,2,0,2,0], maj7:[-1,0,2,1,2,0],
  min7:[-1,0,2,0,1,0], dim:[-1,0,1,2,1,-1],
  dim7:null, sus4:[-1,0,2,2,3,0], sus2:[-1,0,2,2,0,0],
};

function getGuitarShape(rootSemi, quality, flat) {
  const openKey = noteName(rootSemi, flat) + '_' + quality;
  if (OPEN_SHAPES[openKey]) return OPEN_SHAPES[openKey];
  if (quality === 'dim7') {
    let Rd = ((rootSemi - 2) % 12 + 12) % 12;
    while (Rd > 9) Rd -= 3;
    return [-1,-1, Rd, Rd+1, Rd, Rd+1];
  }
  const Re = ((rootSemi - 4) % 12 + 12) % 12;
  const Ra = ((rootSemi - 9) % 12 + 12) % 12;
  function buildShape(off, R) {
    if (!off) return null;
    const frets = off.map(o => o === -1 ? -1 : R + o);
    const active = frets.filter(f => f > 0);
    if (!active.length) return frets;
    if (Math.max(...active) > 15) return null;
    if (R > 0 && Math.max(...active) - Math.min(...active) > 4) return null;
    return frets;
  }
  const eS = buildShape(E_OFF[quality], Re);
  const aS = buildShape(A_OFF[quality], Ra);
  if (!eS && !aS) return buildShape(E_OFF['maj'], Re);
  if (!eS) return aS; if (!aS) return eS;
  return Math.max(...eS.filter(f=>f>0),0) <= Math.max(...aS.filter(f=>f>0),0) ? eS : aS;
}

function getPowerChordShape(rootSemi) {
  const Re = ((rootSemi - 4) % 12 + 12) % 12;
  const Ra = ((rootSemi - 9) % 12 + 12) % 12;
  if (Re <= 9) return [Re, Re+2, Re+2, -1, -1, -1];
  return [-1, Ra, Ra+2, Ra+2, -1, -1];
}

function powerChordNotes(rootSemi) {
  return [rootSemi % 12, (rootSemi + 7) % 12];
}

// STATE

let currentVibe = 'post-punk';
let currentResult = null;
let preferFlat = false;

// ═══════════════════════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════════════════════

function generate() {
  const vibe = VIBES.find(v => v.id === currentVibe) || VIBES[0];
  const prog = vibe.progressions[Math.floor(Math.random() * vibe.progressions.length)];
  const keyRoot = Math.floor(Math.random() * 12);
  preferFlat = USE_FLAT.has(keyRoot);

  const scaleIntervals = SCALE[prog.key];
  const scaleTones = scaleIntervals.map(i => (keyRoot + i) % 12);
  const isPostPunkMode = vibe.id === 'post-punk';

  const resolvedChords = prog.chords.map(c => {
    const root = (keyRoot + scaleIntervals[c.deg - 1]) % 12;
    let effectiveQ = c.q;
    if (isPostPunkMode && c.q !== 'sus4' && c.q !== 'sus2') {
      const r = Math.random();
      if (r < 0.08) effectiveQ = 'sus4';
      else if (r < 0.12) effectiveQ = 'sus2';
    }
    const isSus = effectiveQ === 'sus4' || effectiveQ === 'sus2';
    return {
      root, quality: c.q, effectiveQ, isSus,
      degree: c.deg,
      numeral: degreeNumeral(c.deg, effectiveQ),
      symbol: chordSymbol(root, effectiveQ, preferFlat),
      notes: chordNotes(root, effectiveQ),
      powerNotes: [root % 12, (root + 7) % 12],
    };
  });

  currentResult = { keyRoot, prog, vibe, resolvedChords, scaleTones };
  renderResult();
}

function renderResult() {
  const { keyRoot, prog, resolvedChords, scaleTones } = currentResult;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('playback-bar').style.display = 'flex';
  stopPlay();

  const keyEl = document.getElementById('prog-key-el');
  keyEl.classList.add('fade');
  setTimeout(() => {
    keyEl.textContent = noteName(keyRoot, preferFlat) + (prog.key === 'min' ? 'm' : '');
    keyEl.classList.remove('fade');
  }, 160);

  document.getElementById('prog-name-el').textContent = prog.name;
  document.getElementById('prog-scale-el').textContent =
    noteName(keyRoot, preferFlat) + ' ' + (prog.key === 'maj' ? 'Major' : 'Natural Minor');

  const textLine = resolvedChords.map(c => c.symbol).join(' – ');
  const textEl = document.getElementById('prog-text-el');
  textEl.textContent = textLine;
  textEl.title = 'click to copy: ' + textLine;
  textEl.onclick = () => copyToClipboard(textLine);

  // Chord cards
  const row = document.getElementById('chords-row');
  row.innerHTML = '';
  const allChordTones = new Set(resolvedChords.flatMap(c => c.notes));
  resolvedChords.forEach((ch, i) => row.appendChild(buildChordCard(ch, i + 1)));

  // Piano roll
  const prRow = document.getElementById('piano-roll-row');
  prRow.innerHTML = '';
  const isPPRoll = currentVibe === 'post-punk';
  resolvedChords.forEach(ch => {
    const cell = document.createElement('div');
    cell.className = 'piano-roll-cell';
    const lbl = document.createElement('div');
    lbl.className = 'piano-roll-cell-label';
    const usePwr = isPPRoll && !ch.isSus;
    lbl.textContent = usePwr ? noteName(ch.root, preferFlat) + '5' : ch.symbol;
    cell.appendChild(lbl);
    cell.appendChild(drawPianoOctave(usePwr ? ch.powerNotes : ch.notes, ch.root));
    prRow.appendChild(cell);
  });

  // Scale strip
  const scaleRow = document.getElementById('scale-notes-row');
  scaleRow.innerHTML = '';
  scaleTones.forEach(s => {
    const el = document.createElement('div');
    el.className = 'scale-note' +
      (s === currentResult.keyRoot ? ' root' : allChordTones.has(s) ? ' chord-tone' : '');
    el.textContent = noteName(s, preferFlat);
    scaleRow.appendChild(el);
  });
}

function buildChordCard(ch, bar) {
  const card = document.createElement('div');
  card.className = 'chord-card';
  card.setAttribute('data-bar', bar);

  const numEl = document.createElement('div');
  numEl.className = 'chord-numeral';
  numEl.textContent = ch.numeral;

  const nameEl = document.createElement('div');
  nameEl.className = 'chord-name-display';
  nameEl.textContent = ch.symbol;

  const isPP = currentVibe === 'post-punk';
  const usePwr = isPP && !ch.isSus;
  const displayNotes = usePwr ? ch.powerNotes : ch.notes;

  const notesEl = document.createElement('div');
  notesEl.className = 'chord-notes-display';
  notesEl.textContent = usePwr
    ? displayNotes.map(n => noteName(n, preferFlat)).join(' · ') + '  (5)'
    : ch.notes.map(n => noteName(n, preferFlat)).join(' · ');

  const diagWrap = document.createElement('div');
  diagWrap.className = 'chord-diagram-wrap';
  const frets = usePwr
    ? getPowerChordShape(ch.root)
    : getGuitarShape(ch.root, ch.effectiveQ || ch.quality, preferFlat);
  if (frets) diagWrap.appendChild(drawChordDiagram(frets, displayNotes, ch.root));

  card.appendChild(numEl);
  card.appendChild(nameEl);
  card.appendChild(notesEl);
  card.appendChild(diagWrap);
  return card;
}

function buildVibeBar() {
  const bar = document.querySelector('.vibe-bar');
  bar.innerHTML = '<span class="vibe-label">Vibe</span>';
  VIBES.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'vibe-tag' + (v.id === currentVibe ? ' active' : '');
    btn.textContent = v.label;
    btn.onclick = () => {
      currentVibe = v.id;
      document.querySelectorAll('.vibe-tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      generate();
    };
    bar.appendChild(btn);
  });
}

}

// ═══════════════════════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════════════════════

const NS = 'http://www.w3.org/2000/svg';
function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

function drawPianoOctave(hlNotes, root) {
  const hl = new Set(hlNotes.map(n => ((n%12)+12)%12));
  const rootMod = ((root%12)+12)%12;
  const WW=15, WH=52, BW=10, BH=32;
  const WHITE=[0,2,4,5,7,9,11];
  const BLACK=[{aw:0,s:1},{aw:1,s:3},{aw:3,s:6},{aw:4,s:8},{aw:5,s:10}];
  const svg = mkEl('svg',{viewBox:`0 0 ${7*WW+1} ${WH+2}`,width:'100%',height:WH+2});
  svg.style.display='block';
  for (let i=0;i<7;i++) {
    const s=WHITE[i], isHl=hl.has(s), isRoot=s===rootMod, x=i*WW;
    const fill=isRoot&&isHl?'#c42020':isHl?'#e8e0cc':'#1c1c1c';
    const stroke=isRoot&&isHl?'#e03030':isHl?'#aaa':'#2a2a2a';
    svg.appendChild(mkEl('rect',{x:x+0.5,y:0.5,width:WW-1,height:WH-1,rx:1,fill,stroke,'stroke-width':'0.8'}));
    if(isHl){const t=mkEl('text',{x:x+WW/2,y:WH-6,'text-anchor':'middle','font-size':7,'font-family':'IBM Plex Mono,monospace','font-weight':'700',fill:isRoot?'#fff':'#0a0a0a'});t.textContent=noteName(s,preferFlat);svg.appendChild(t);}
  }
  for (const bk of BLACK) {
    const s=bk.s, isHl=hl.has(s), isRoot=s===rootMod, cx=(bk.aw+1)*WW;
    const fill=isRoot&&isHl?'#c42020':isHl?'#e8e0cc':'#0a0a0a';
    const stroke=isRoot&&isHl?'#e03030':isHl?'#888':'#1a1a1a';
    svg.appendChild(mkEl('rect',{x:cx-BW/2+0.5,y:0.5,width:BW-1,height:BH-1,rx:1,fill,stroke,'stroke-width':'0.6'}));
    if(isHl){const t=mkEl('text',{x:cx,y:BH-5,'text-anchor':'middle','font-size':6,'font-family':'IBM Plex Mono,monospace','font-weight':'700',fill:isRoot?'#fff':'#0a0a0a'});t.textContent=noteName(s,preferFlat);svg.appendChild(t);}
  }
  return svg;
}

function drawChordDiagram(frets, noteSet, root) {
  const SS=20,FS=22,ROWS=4,LP=24,TP=32;
  const played=frets.filter(f=>f>0);
  const minF=played.length?Math.min(...played):1;
  const baseFret=minF<=2?1:minF;
  const W=LP+5*SS+12, H=TP+ROWS*FS+12;
  const svg=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  svg.style.display='block';
  if(baseFret===1){svg.appendChild(mkEl('rect',{x:LP,y:TP-4,width:5*SS,height:4,fill:'#b8a870'}));}
  else{const t=mkEl('text',{x:LP-4,y:TP+FS*0.6,'text-anchor':'end','font-size':8,'font-family':'IBM Plex Mono,monospace',fill:'#555'});t.textContent=baseFret+'fr';svg.appendChild(t);}
  for(let f=0;f<=ROWS;f++) svg.appendChild(mkEl('line',{x1:LP,y1:TP+f*FS,x2:LP+5*SS,y2:TP+f*FS,stroke:'#1e1e1e','stroke-width':f===0?'1.5':'0.8'}));
  for(let s=0;s<6;s++){const x=LP+s*SS,sw=s<2?2.2:s<4?1.4:0.9;svg.appendChild(mkEl('line',{x1:x,y1:TP,x2:x,y2:TP+ROWS*FS,stroke:'#2a2a2a','stroke-width':sw}));}
  for(let s=0;s<6;s++){
    const f=frets[s],x=LP+s*SS;
    if(f===-1){const t=mkEl('text',{x,y:TP-12,'text-anchor':'middle','font-size':12,fill:'#333','font-family':'IBM Plex Mono,monospace','font-weight':'600'});t.textContent='×';svg.appendChild(t);}
    else if(f===0){svg.appendChild(mkEl('circle',{cx:x,cy:TP-10,r:5,fill:'none',stroke:'#333','stroke-width':'1.2'}));}
    else{const rel=f-baseFret+1;if(rel>=1&&rel<=ROWS){const y=TP+(rel-0.5)*FS,nc=(OPEN_STRINGS[s]+f)%12,isR=nc===root,fill=isR?'#c42020':'#e8e0cc';svg.appendChild(mkEl('circle',{cx:x,cy:y,r:8,fill}));const t=mkEl('text',{x,y:y+3,'text-anchor':'middle','font-size':7,'font-weight':'700','font-family':'IBM Plex Mono,monospace',fill:isR?'#fff':'#0a0a0a'});t.textContent=noteName(nc,preferFlat);svg.appendChild(t);}}
  }
  return svg;
}

// ═══════════════════════════════════════════════════════════
// MIDI EXPORT
// ═══════════════════════════════════════════════════════════

function voiceChordMidi(noteClasses, rootSemi) {
  const rootClass = ((rootSemi%12)+12)%12;
  const rootMidi = rootClass + 48;
  return noteClasses.map(nc => {
    const cls = ((nc%12)+12)%12;
    let midi = cls + 48;
    while (midi < rootMidi) midi += 12;
    while (midi > rootMidi + 11) midi -= 12;
    return midi;
  });
}

function varLen(n) {
  if (n < 0x80) return [n];
  const out=[];
  out.unshift(n & 0x7F); n >>= 7;
  while (n>0) { out.unshift((n&0x7F)|0x80); n>>=7; }
  return out;
}

function buildMidiBytes(chords) {
  const TICKS=480, BEATS=8, CHORD_TICKS=TICKS*BEATS;
  const USPB=Math.round(60000000/bpm);
  const track=[];
  track.push(0x00,0xFF,0x51,0x03,(USPB>>16)&0xFF,(USPB>>8)&0xFF,USPB&0xFF);
  track.push(0x00,0xC0,0x00);
  chords.forEach(ch => {
    const usePwr = currentVibe==='post-punk' && !ch.isSus;
    const midiNotes = voiceChordMidi(usePwr?ch.powerNotes:ch.notes, ch.root);
    midiNotes.forEach(note => { track.push(...varLen(0)); track.push(0x90,note&0x7F,80); });
    midiNotes.forEach((note,i) => { track.push(...varLen(i===0?CHORD_TICKS:0)); track.push(0x80,note&0x7F,0); });
  });
  track.push(0x00,0xFF,0x2F,0x00);
  const header=[0x4D,0x54,0x68,0x64,0x00,0x00,0x00,0x06,0x00,0x00,0x00,0x01,(TICKS>>8)&0xFF,TICKS&0xFF];
  const tlen=track.length;
  return new Uint8Array([...header,0x4D,0x54,0x72,0x6B,(tlen>>24)&0xFF,(tlen>>16)&0xFF,(tlen>>8)&0xFF,tlen&0xFF,...track]);
}

function exportMIDI() {
  if (!currentResult) return;
  const bytes=buildMidiBytes(currentResult.resolvedChords);
  const blob=new Blob([bytes],{type:'audio/midi'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const pn=(currentResult.prog.name||'prog').replace(/\s+/g,'-').toLowerCase();
  const kn=noteName(currentResult.keyRoot,preferFlat)+(currentResult.prog.key==='min'?'m':'');
  a.href=url; a.download=`proglab-${kn}-${pn}.mid`; a.click();
  URL.revokeObjectURL(url);
  const btn=document.getElementById('midi-btn');
  btn.textContent='Exported ✓'; btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Export MIDI';btn.classList.remove('copied');},1800);
}

// ═══════════════════════════════════════════════════════════
// AUDIO ENGINE
// Two voices: 'synth' (detuned saw + triangle) and 'piano'
// (inharmonic overtone decay, hammer transient)
// ═══════════════════════════════════════════════════════════

let audioCtx = null;
let playTimer = null;
let isPlaying = false;
let playBeat = 0;
let playLoop = 0;
let bpm = 90;
let audioMode = 'synth'; // 'synth' | 'piano'
let metronomeOn = false;
let nextChordTime = 0; // AudioContext-clock time for next chord start

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── Metronome click: short sine blip scheduled at precise AudioContext time ──
function scheduleClick(ctx, time, isDownbeat) {
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = isDownbeat ? 1100 : 880;
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(isDownbeat ? 0.28 : 0.18, time + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, time + 0.045);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(time); osc.stop(time + 0.06);
}

function toggleMetronome() {
  metronomeOn = !metronomeOn;
  const btn = document.getElementById('metro-btn');
  btn.classList.toggle('on', metronomeOn);
}

function midiFreq(note) { return 440 * Math.pow(2, (note - 69) / 12); }

// ── Synth voice: detuned sawtooth pair + triangle + sub ──
function playNoteSynth(ctx, midiNote, startTime, duration, velocity) {
  const freq = midiFreq(midiNote);
  const master = ctx.createGain();
  master.connect(ctx.destination);
  const atk=0.008, dec=0.18, sus=0.45, rel=0.4, peak=velocity;
  master.gain.setValueAtTime(0, startTime);
  master.gain.linearRampToValueAtTime(peak, startTime+atk);
  master.gain.exponentialRampToValueAtTime(peak*sus, startTime+atk+dec);
  master.gain.setValueAtTime(peak*sus, startTime+duration-rel);
  master.gain.exponentialRampToValueAtTime(0.0001, startTime+duration);

  [0,4].forEach(det => {
    const o=ctx.createOscillator(); o.type='sawtooth';
    o.frequency.value=freq; o.detune.value=det;
    const g=ctx.createGain(); g.gain.value=0.12;
    o.connect(g); g.connect(master); o.start(startTime); o.stop(startTime+duration+0.05);
  });
  const tri=ctx.createOscillator(); tri.type='triangle';
  tri.frequency.value=freq;
  const tg=ctx.createGain(); tg.gain.value=0.22;
  tri.connect(tg); tg.connect(master); tri.start(startTime); tri.stop(startTime+duration+0.05);
  const sub=ctx.createOscillator(); sub.type='sine';
  sub.frequency.value=freq/2;
  const sg=ctx.createGain(); sg.gain.value=0.10;
  sub.connect(sg); sg.connect(master); sub.start(startTime); sub.stop(startTime+duration+0.05);
}

// ── Piano voice: additive inharmonic overtones with fast decay ──
// Models a struck string: fast transient, no sustain, overtones decay at
// different rates (higher partials decay faster — characteristic of piano).
function playNotePiano(ctx, midiNote, duration, startTime, velocity) {
  const freq = midiFreq(midiNote);
  const master = ctx.createGain();
  master.gain.value = 1;
  master.connect(ctx.destination);

  // Inharmonicity factor (higher notes are more inharmonic on a real piano)
  const B = 0.00015 * Math.pow(freq / 110, 0.6);

  // Partials: [relative amplitude, decay multiplier]
  const partials = [
    [1.00, 1.0],   // fundamental
    [0.60, 1.8],   // 2nd partial
    [0.35, 2.8],   // 3rd
    [0.20, 4.2],   // 4th
    [0.10, 6.0],   // 5th
    [0.05, 9.0],   // 6th
  ];

  const baseDecay = Math.max(0.6, 3.5 - freq / 500); // low notes sustain longer

  partials.forEach(([amp, decayMult], n) => {
    const partialN = n + 1;
    // Slightly inharmonic frequency
    const partialFreq = freq * partialN * Math.sqrt(1 + B * partialN * partialN);
    const decayTime = baseDecay / decayMult;

    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = partialFreq;

    const g = ctx.createGain();
    g.gain.setValueAtTime(0, startTime);
    // Very fast attack (hammer strike)
    g.gain.linearRampToValueAtTime(velocity * amp * 0.35, startTime + 0.003);
    // Exponential decay — no sustain
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + decayTime);

    osc.connect(g);
    g.connect(master);
    osc.start(startTime);
    osc.stop(startTime + decayTime + 0.05);
  });

  // Hammer transient: short noise burst
  try {
    const bufLen = Math.floor(ctx.sampleRate * 0.015);
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(velocity * 0.06, startTime);
    ng.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.012);
    // Bandpass around the fundamental for colour
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = freq;
    bp.Q.value = 3;
    noise.connect(bp); bp.connect(ng); ng.connect(master);
    noise.start(startTime); noise.stop(startTime + 0.02);
  } catch(e) {}
}

function playNote(ctx, midiNote, startTime, duration, velocity = 0.6) {
  if (audioMode === 'piano') {
    playNotePiano(ctx, midiNote, duration, startTime, velocity);
  } else {
    playNoteSynth(ctx, midiNote, startTime, duration, velocity);
  }
}

function playChordAudio(ctx, midiNotes, startTime, chordDur) {
  midiNotes.forEach((note, i) => {
    const stagger = i * 0.012;
    const vel = i === 0 ? 0.65 : 0.50;
    playNote(ctx, note, startTime + stagger, chordDur - stagger, vel);
  });
}

function setAudioMode(mode) {
  audioMode = mode;
  document.getElementById('opt-synth').classList.toggle('active', mode === 'synth');
  document.getElementById('opt-piano').classList.toggle('active', mode === 'piano');
}

function onBpmChange(val) {
  bpm = parseInt(val);
  document.getElementById('bpm-val').textContent = bpm;
  if (isPlaying) { stopPlay(); startPlay(); }
}

function togglePlay() {
  if (isPlaying) stopPlay(); else startPlay();
}

function startPlay() {
  if (!currentResult) return;
  isPlaying = true; playBeat = 0;
  const btn = document.getElementById('play-btn');
  btn.textContent = '■ Stop'; btn.classList.add('playing');
  scheduleNextChord();
}

function stopPlay() {
  isPlaying = false; playBeat = 0; nextChordTime = 0;
  clearTimeout(playTimer);
  const btn = document.getElementById('play-btn');
  if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('playing'); }
  document.querySelectorAll('.chord-card.active-beat').forEach(c => c.classList.remove('active-beat'));
  document.getElementById('loop-dot')?.classList.remove('pulse');
}

function scheduleNextChord() {
  if (!isPlaying || !currentResult) return;

  const chords = currentResult.resolvedChords;
  const secPerBeat = 60 / bpm;
  const beatsPerChord = 4;           // 1 bar of 4/4
  const chordDur = beatsPerChord * secPerBeat;
  const ctx = getAudioCtx();

  // First call: anchor to now. Subsequent calls use the accumulated clock.
  if (nextChordTime < ctx.currentTime) nextChordTime = ctx.currentTime + 0.02;

  const ch = chords[playBeat];
  const usePwr = currentVibe === 'post-punk' && !ch.isSus;
  const noteClasses = usePwr ? ch.powerNotes : ch.notes;
  const midiNotes = voiceChordMidi(noteClasses, ch.root);

  // Schedule chord audio at exact AudioContext time (no drift)
  playChordAudio(ctx, midiNotes, nextChordTime, chordDur * 0.92);

  // Schedule metronome clicks for every beat in this chord
  if (metronomeOn) {
    for (let b = 0; b < beatsPerChord; b++) {
      scheduleClick(ctx, nextChordTime + b * secPerBeat, b === 0);
    }
  }

  // Visual update fired at the right wall-clock moment
  const visualDelay = Math.max(0, (nextChordTime - ctx.currentTime) * 1000);
  const capturedBeat = playBeat;
  setTimeout(() => {
    document.querySelectorAll('.chord-card').forEach((c, i) => {
      c.classList.toggle('active-beat', i === capturedBeat);
    });
    const dot = document.getElementById('loop-dot');
    if (dot) {
      dot.classList.add('pulse');
      setTimeout(() => { const d = document.getElementById('loop-dot'); if (d) d.classList.remove('pulse'); }, 100);
    }
  }, visualDelay);

  // Advance beat pointer
  nextChordTime += chordDur;
  playBeat++;
  if (playBeat >= chords.length) { playBeat = 0; playLoop++; }

  // Wake up slightly before the next chord is due
  const wakeupDelay = Math.max(0, (nextChordTime - ctx.currentTime - 0.05) * 1000);
  playTimer = setTimeout(scheduleNextChord, wakeupDelay);
}

// ═══════════════════════════════════════════════════════════

buildVibeBar();

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault(); generate();
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
